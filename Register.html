<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>বিল প্রাপ্তি ও প্রদান রেজিস্টার</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --bg-gradient: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            --glass-white: rgba(255, 255, 255, 0.7);
            --border-color: rgba(37, 99, 235, 0.2);
        }

        body {
            font-family: 'Hind Siliguri', 'Poppins', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            margin: 0;
            padding: 20px;
            color: #1e293b;
        }

        .container {
            max-width: 1400px;
            margin: auto;
            background: var(--glass-white);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid rgba(0,0,0,0.05);
            padding-bottom: 15px;
        }

        h2 { margin: 0; color: var(--primary); font-size: 28px; }

        .toolbar {
            display: grid;
            grid-template-columns: 2fr 1fr 0.5fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .search-container input, .filter-container input {
            width: 100%;
            padding: 14px;
            border: 2px solid var(--primary);
            border-radius: 12px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.9);
            outline: none;
            box-sizing: border-box;
            text-align: center;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-add { background: var(--primary); color: white; }
        .btn-add:hover { background: #1d4ed8; transform: translateY(-2px); }

        .table-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            overflow-x: auto;
            border: 1px solid var(--primary);
        }

        table { width: 100%; border-collapse: collapse; min-width: 1000px; }

        th {
            background: var(--primary);
            color: white;
            padding: 18px;
            text-align: center;
        }

        td {
            padding: 14px;
            border-bottom: 1px solid #e2e8f0;
            text-align: center;
            font-size: 15px;
        }

        tr:hover { background: rgba(37, 99, 235, 0.05); }

        .delivery-highlight {
            background: #dcfce7;
            color: #166534;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: white;
            width: 600px;
            padding: 30px;
            border-radius: 20px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full { grid-column: span 2; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }

        #loadingStatus {
            text-align: center;
            padding: 20px;
            font-weight: bold;
            color: var(--primary);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>📋 বিল প্রাপ্তি ও প্রদান রেজিস্টার</h2>
        <button class="btn btn-add" onclick="toggleModal(true)">+ নতুন বিল এন্ট্রি</button>
    </header>

    <div class="toolbar">
        <div class="search-container">
            <input type="text" id="multiSearch" placeholder="বিল নম্বর, অফিস অথবা টোকেন নম্বর দিয়ে সার্চ করুন..." onkeyup="renderData()">
        </div>
        <div class="filter-container">
            <input type="month" id="monthFilter" onchange="renderData()">
        </div>
        <button class="btn" style="background: #94a3b8; color: white;" onclick="resetAll()">রিসেট</button>
    </div>

    <div id="loadingStatus" style="display:none;">গুগল শিট থেকে ডাটা লোড হচ্ছে...</div>

    <div class="table-card">
        <table>
            <thead>
                <tr>
                    <th>ক্রমিক</th>
                    <th>বিল নং</th>
                    <th>অফিস/ডিডিও</th>
                    <th>প্রাপ্তি</th>
                    <th>টোকেন নং</th>
                    <th>পরিমাণ</th>
                    <th>ডেলিভারি</th>
                    <th>প্রাপক</th>
                    <th>মন্তব্য</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h3 id="modalTitle" style="color:var(--primary)">নতুন বিল এন্ট্রি</h3>
        <div class="form-grid">
            <div class="form-group"><label>বিল নম্বর</label><input type="text" id="billNo"></div>
            <div class="form-group"><label>অফিস/ডিডিও</label><input type="text" id="office"></div>
            <div class="form-group"><label>প্রাপ্তির তারিখ</label><input type="date" id="receiveDate"></div>
            <div class="form-group"><label>টোকেন নম্বর</label><input type="text" id="tokenNo"></div>
            <div class="form-group"><label>পরিমাণ</label><input type="number" id="amount"></div>
            <div class="form-group"><label>ডেলিভারি তারিখ</label><input type="date" id="deliveryDate"></div>
            <div class="form-group full"><label>প্রাপকের নাম</label><input type="text" id="receiverName"></div>
            <div class="form-group full"><label>মন্তব্য</label><input type="text" id="remarks"></div>
        </div>
        <div style="margin-top: 25px; text-align: right;">
            <button class="btn" style="background:#e2e8f0" onclick="toggleModal(false)">বাতিল</button>
            <button class="btn btn-add" id="saveBtn" onclick="saveData()">সেভ করুন</button>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxqVO-0054ZgCCSZ3aHf2KZ4FEeabQvQukR0y1ERiRu2gvQDEgpIc58Wx27MW1yVU2d/exec";
    let bills = [];

    // পেজ লোড হলে ডাটা আনা
    window.onload = loadData;

    async function loadData() {
        document.getElementById('loadingStatus').style.display = 'block';
        try {
            const response = await fetch(SCRIPT_URL);
            bills = await response.json();
            renderData();
        } catch (error) {
            console.error("Error loading data:", error);
            alert("ডাটা লোড করতে সমস্যা হয়েছে।");
        } finally {
            document.getElementById('loadingStatus').style.display = 'none';
        }
    }

    async function saveData() {
        const saveBtn = document.getElementById('saveBtn');
        const data = {
            billNo: document.getElementById('billNo').value,
            office: document.getElementById('office').value,
            receiveDate: document.getElementById('receiveDate').value,
            tokenNo: document.getElementById('tokenNo').value,
            amount: document.getElementById('amount').value,
            deliveryDate: document.getElementById('deliveryDate').value,
            receiverName: document.getElementById('receiverName').value,
            remarks: document.getElementById('remarks').value
        };

        if(!data.billNo || !data.office) return alert("বিল নম্বর এবং অফিস নাম আবশ্যক!");

        saveBtn.innerText = "সেভ হচ্ছে...";
        saveBtn.disabled = true;

        try {
            await fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors", // CORS ইস্যু এড়াতে
                cache: "no-cache",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });
            
            toggleModal(false);
            // সরাসরি শিট থেকে আপডেট ডাটা আনতে ২ সেকেন্ড অপেক্ষা (Apps Script Sync Time)
            setTimeout(loadData, 1500); 
        } catch (error) {
            alert("সেভ করতে সমস্যা হয়েছে।");
            saveBtn.disabled = false;
            saveBtn.innerText = "সেভ করুন";
        }
    }

    function renderData() {
        const tbody = document.getElementById('tableBody');
        const query = document.getElementById('multiSearch').value.toLowerCase();
        const month = document.getElementById('monthFilter').value;
        tbody.innerHTML = "";

        bills.forEach((b, i) => {
            // Apps Script থেকে আসা ডাটা প্রসেসিং (key names logic)
            const bNo = b.billno || '';
            const bOff = b.office || '';
            const bTok = b.tokenno || '';
            const bDate = b.receivedate || '';

            const matchesQuery = bNo.toString().toLowerCase().includes(query) || 
                                 bOff.toLowerCase().includes(query) || 
                                 bTok.toString().toLowerCase().includes(query);
            
            const matchesMonth = !month || bDate.startsWith(month);

            if(matchesQuery && matchesMonth) {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${i + 1}</td>
                    <td><b>${bNo}</b></td>
                    <td>${bOff}</td>
                    <td>${bDate}</td>
                    <td>${bTok}</td>
                    <td>${Number(b.amount || 0).toLocaleString('bn-BD')}</td>
                    <td><span class="delivery-highlight">${b.deliverydate || 'প্রক্রিয়াধীন'}</span></td>
                    <td>${b.receivername || ''}</td>
                    <td>${b.remarks || ''}</td>
                `;
                tbody.appendChild(tr);
            }
        });
    }

    function toggleModal(show) {
        document.getElementById('modalOverlay').style.display = show ? 'flex' : 'none';
        if(!show) {
            document.querySelectorAll('.modal input').forEach(input => input.value = "");
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.innerText = "সেভ করুন";
            saveBtn.disabled = false;
        }
    }

    function resetAll() {
        document.getElementById('multiSearch').value = "";
        document.getElementById('monthFilter').value = "";
        renderData();
    }
</script>

</body>
</html>
