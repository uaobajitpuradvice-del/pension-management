<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPO ম্যানেজমেন্ট সিস্টেম - স্মার্ট সার্চ</title>
    <style>
        :root {
            --primary-blue: #2563eb;
            --dark-blue: #1e3a8a;
            --bg-solid: #f1f5f9;
            --white: #ffffff;
            --success: #10b981;
            --warning: #f59e0b;
            --highlight: #ffeb3b;
            --shadow-lg: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            background-color: var(--bg-solid);
            font-size: 17px;
        }

        nav {
            background-color: var(--dark-blue);
            padding: 12px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            position: sticky; top: 0; z-index: 1000;
        }

        .nav-brand { font-size: 20px; font-weight: bold; }
        .nav-stats-container { display: flex; align-items: center; gap: 15px; }
        .nav-stat { background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 20px; font-size: 14px; }

        .refresh-btn {
            background: #10b981; color: white; border: none; padding: 8px 15px;
            border-radius: 8px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; transition: 0.3s;
        }
        .refresh-btn:hover { background: #059669; transform: scale(1.05); }

        .spin { animation: rotate 1s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .office-header {
            background: var(--white); padding: 30px; text-align: center; margin: 20px auto;
            max-width: 90%; border-radius: 20px; box-shadow: var(--shadow-lg);
        }
        .office-name { font-size: 35px; color: var(--dark-blue); margin: 0; font-weight: 800; }

        .search-section { margin: 30px auto; display: flex; justify-content: center; gap: 15px; }
        #searchInput {
            width: 500px; padding: 18px 30px; font-size: 18px; border-radius: 50px;
            border: 3px solid #cbd5e1; outline: none; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        #searchInput:focus { width: 600px; border-color: var(--primary-blue); box-shadow: 0 0 25px rgba(37, 99, 235, 0.2); }

        #filterStatus { padding: 15px 25px; border-radius: 50px; border: 3px solid var(--primary-blue); font-weight: bold; cursor: pointer; }

        .container { max-width: 1400px; margin: 0 auto; padding-bottom: 60px; }
        .data-card { background: var(--white); border-radius: 20px; padding: 25px; box-shadow: var(--shadow-lg); }
        table { width: 100%; border-collapse: collapse; border: 2px solid #cbd5e1; }
        th, td { padding: 15px; border: 1px solid #cbd5e1; text-align: center; }
        th { background: #f8fafc; color: var(--dark-blue); }
        
        .hl { background-color: var(--highlight); padding: 2px; border-radius: 3px; font-weight: bold; }
        
        .page-btn { padding: 10px 20px; border-radius: 12px; border: 1px solid #cbd5e1; background: white; cursor: pointer; font-weight: 600; }
        .page-btn:hover:not(:disabled) { background: var(--dark-blue); color: white; }

        @media print {
            nav, .search-section, .pagination, .action-col { display: none !important; }
            table { border: 2px solid black; }
            th, td { border: 1px solid black !important; }
        }
    </style>
</head>
<body>

<div id="loadingOverlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); display:none; justify-content:center; align-items:center; z-index:9999;"><b>🔄 ডাটা প্রসেসিং...</b></div>

<nav>
    <div class="nav-brand">📂 PPO ড্যাশবোর্ড</div>
    <div class="nav-stats-container">
        <button class="refresh-btn" id="refreshBtn" onclick="fetchData()">
            <span id="refreshIcon">🔄</span> রিফ্রেশ
        </button>
        <div class="nav-stat">মোট: <span id="total">০</span></div>
        <div class="nav-stat">সংরক্ষিত: <span id="saved">০</span></div>
        <div class="nav-stat">বিতরণকৃত: <span id="dist">০</span></div>
    </div>
    <div style="display:flex; gap:10px;">
        <button class="page-btn" onclick="showSection('home')">🏠 হোম</button>
        <button class="page-btn" style="background:var(--primary-blue); color:white;" onclick="openForm()">➕ নতুন</button>
    </div>
</nav>

<div class="office-header">
    <h1 class="office-name">উপজেলা হিসাবরক্ষণ অফিস, বাজিতপুর</h1>
    <p style="font-size: 20px; color: #64748b; margin-top: 10px;">স্মার্ট পিপিও ম্যানেজমেন্ট সিস্টেম</p>
</div>

<div class="search-section">
    <input type="text" id="searchInput" placeholder="🔎 নাম বা পিপিও (ইংরেজি/বাংলা) লিখে খুঁজুন..." onkeyup="handleSearch()">
    <select id="filterStatus" onchange="handleSearch()">
        <option value="all">সব তথ্য</option>
        <option value="সংরক্ষিত">সংরক্ষিত</option>
        <option value="বিতরণকৃত">বিতরণকৃত</option>
    </select>
    <button class="page-btn" style="background: #ef4444; color: white;" onclick="printReport()">🖨️ প্রিন্ট</button>
</div>

<div class="container">
    <div id="homeSection">
        <div class="data-card">
            <table>
                <thead>
                    <tr>
                        <th width="80">ক্রমিক</th>
                        <th style="text-align:left; padding-left:20px;">নাম</th>
                        <th>পিপিও নম্বর</th>
                        <th>অবস্থা</th>
                        <th>তারিখ</th>
                        <th class="action-col" width="100">অ্যাকশন</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
            
            <div style="margin-top: 30px; display: flex; justify-content: center; gap: 15px; align-items: center;">
                <button id="prevBtn" class="page-btn" onclick="changePage(-1)">⇠ পূর্ববর্তী</button>
                <span>পৃষ্ঠা: <b id="currentPageBn">১</b> / <b id="totalPageBn">১</b></span>
                <button id="nextBtn" class="page-btn" onclick="changePage(1)">পরবর্তী ⇢</button>
            </div>
        </div>
    </div>

    <div id="entrySection" style="display:none;">
        <div style="background:white; padding:40px; border-radius:20px; max-width:600px; margin:0 auto; box-shadow:var(--shadow-lg);">
            <h2 id="formTitle" style="text-align:center; color:var(--dark-blue);">ডাটা এন্ট্রি</h2>
            <form id="ppoForm">
                <input type="hidden" id="oldId">
                <div style="margin-bottom:15px;"><label>ক্রমিক নং</label><input type="number" id="pId" required style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd;"></div>
                <div style="margin-bottom:15px;"><label>নাম</label><input type="text" id="pName" required style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd;"></div>
                <div style="margin-bottom:15px;"><label>পিপিও নম্বর</label><input type="text" id="pNo" required style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd;"></div>
                <div style="margin-bottom:15px;"><label>অবস্থা</label>
                    <select id="pStatus" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd;">
                        <option value="সংরক্ষিত">সংরক্ষিত</option>
                        <option value="বিতরণকৃত">বিতরণকৃত</option>
                    </select>
                </div>
                <div style="margin-bottom:15px;"><label>তারিখ</label><input type="date" id="pDate" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd;"></div>
                <div style="margin-bottom:15px;"><label>মন্তব্য</label><input type="text" id="pNote" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd;"></div>
                <button type="submit" style="width:100%; padding:15px; background:var(--primary-blue); color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">সেভ করুন</button>
                <button type="button" onclick="showSection('home')" style="width:100%; margin-top:10px; background:none; border:none; color:gray; cursor:pointer;">বাতিল</button>
            </form>
        </div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbx7YM0zW2FQHzvOfw8b7eW84dz65jrmkZBA5CpbQov4YKDIzLt7c1J_YK3eDx5hkZPz/exec';
    let ppoData = [], filteredData = [], currentPage = 1, totalPages = 1;
    const rowsPerPage = 20;

    const enToBn = { '0':'০', '1':'১', '2':'২', '3':'৩', '4':'৪', '5':'৫', '6':'৬', '7':'৭', '8':'৮', '9':'৯' };
    const bnToEn = { '০':'0', '১':'1', '২':'2', '৩':'3', '৪':'4', '৫':'5', '৬':'6', '৭':'7', '৮':'8', '৯':'9' };

    function toBn(n) { return n ? n.toString().replace(/\d/g, d => enToBn[d]) : '০'; }
    function toEn(n) { return n ? n.toString().replace(/[০-৯]/g, d => bnToEn[d]) : ''; }

    function highlight(text, term) {
        if (!term) return text;
        const regex = new RegExp(`(${term})`, 'gi');
        return text.toString().replace(regex, '<span class="hl">$1</span>');
    }

    window.onload = fetchData;

    function fetchData() {
        const icon = document.getElementById('refreshIcon');
        icon.classList.add('spin');
        showLoading(true);
        fetch(scriptURL).then(res => res.json()).then(data => {
            ppoData = data.sort((a, b) => parseInt(a.id) - parseInt(b.id));
            handleSearch();
            showLoading(false);
            icon.classList.remove('spin');
        }).catch(() => { showLoading(false); icon.classList.remove('spin'); });
    }

    function handleSearch() {
        const term = document.getElementById('searchInput').value.trim();
        const termEn = toEn(term);
        const termBn = toBn(term);
        const statusFilter = document.getElementById('filterStatus').value;
        
        filteredData = ppoData.filter(item => {
            const valName = item.name.toLowerCase();
            const valPpo = item.ppoNo.toString();
            const valId = item.id.toString();

            // নাম অথবা আইডি/পিপিও (বাংলা বা ইংরেজি উভয় ফরমেটেই) চেক করা হচ্ছে
            const matchesSearch = valName.includes(term.toLowerCase()) || 
                                 valPpo.includes(termEn) || valPpo.includes(termBn) ||
                                 valId.includes(termEn) || valId.includes(termBn);
            
            const matchesFilter = statusFilter === 'all' || item.status === statusFilter;
            return matchesSearch && matchesFilter;
        });
        
        totalPages = Math.ceil(filteredData.length / rowsPerPage) || 1;
        currentPage = 1;
        renderTable();
    }

    function renderTable(dataToRender = null) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        const term = document.getElementById('searchInput').value;
        const data = dataToRender || filteredData.slice((currentPage - 1) * rowsPerPage, currentPage * rowsPerPage);

        data.forEach(item => {
            const row = `<tr>
                <td><b>${toBn(item.id)}</b></td>
                <td style="text-align:left; padding-left:20px;">${highlight(item.name, term)}</td>
                <td>${toBn(item.ppoNo)}</td>
                <td><span style="padding:5px 12px; border-radius:15px; font-size:12px; font-weight:bold; background:${item.status === 'সংরক্ষিত' ? '#dcfce7' : '#fef3c7'}; color:${item.status === 'সংরক্ষিত' ? '#166534' : '#92400e'}">${item.status}</span></td>
                <td>${item.deliveryDate ? toBn(item.deliveryDate.split('T')[0]) : '---'}</td>
                <td class="action-col">
                    <button class="page-btn" style="padding:5px 10px;" onclick="editRow('${item.id}')">✏️</button>
                    <button class="page-btn" style="padding:5px 10px; color:red;" onclick="deleteRow('${item.id}')">🗑️</button>
                </td>
            </tr>`;
            tbody.innerHTML += row;
        });
        if(!dataToRender) updateUI();
    }

    function updateUI() {
        document.getElementById('totalPageBn').innerText = toBn(totalPages);
        document.getElementById('currentPageBn').innerText = toBn(currentPage);
        document.getElementById('prevBtn').disabled = currentPage === 1;
        document.getElementById('nextBtn').disabled = currentPage >= totalPages;
        document.getElementById('total').innerText = toBn(ppoData.length);
        document.getElementById('saved').innerText = toBn(ppoData.filter(x => x.status === 'সংরক্ষিত').length);
        document.getElementById('dist').innerText = toBn(ppoData.filter(x => x.status === 'বিতরণকৃত').length);
    }

    function changePage(dir) { currentPage += dir; renderTable(); }
    function showSection(s) { 
        document.getElementById('homeSection').style.display = s === 'home' ? 'block' : 'none'; 
        document.getElementById('entrySection').style.display = s === 'entry' ? 'block' : 'none'; 
    }

    function openForm() { 
        document.getElementById('ppoForm').reset(); 
        document.getElementById('oldId').value = ""; 
        document.getElementById('pId').readOnly = false;
        document.getElementById('pName').readOnly = false;
        document.getElementById('pNo').readOnly = false;
        showSection('entry'); 
    }

    function editRow(id) {
        const item = ppoData.find(x => x.id == id);
        showSection('entry');
        document.getElementById('formTitle').innerText = "তথ্য সংশোধন";
        document.getElementById('oldId').value = item.id;
        document.getElementById('pId').value = item.id; document.getElementById('pId').readOnly = true;
        document.getElementById('pName').value = item.name; document.getElementById('pName').readOnly = true;
        document.getElementById('pNo').value = item.ppoNo; document.getElementById('pNo').readOnly = true;
        document.getElementById('pStatus').value = item.status;
        document.getElementById('pDate').value = item.deliveryDate ? item.deliveryDate.split('T')[0] : '';
        document.getElementById('pNote').value = item.note || '';
    }

    function deleteRow(id) { if(confirm("মুছে ফেলবেন?")) { showLoading(true); fetch(scriptURL, { method: 'POST', body: JSON.stringify({action: "delete", id: id}) }).then(() => fetchData()); } }
    
    document.getElementById('ppoForm').onsubmit = function(e) {
        e.preventDefault();
        showLoading(true);
        const obj = {
            action: document.getElementById('oldId').value ? "edit" : "add",
            oldId: document.getElementById('oldId').value,
            id: document.getElementById('pId').value,
            name: document.getElementById('pName').value,
            ppoNo: document.getElementById('pNo').value,
            status: document.getElementById('pStatus').value,
            deliveryDate: document.getElementById('pDate').value,
            note: document.getElementById('pNote').value
        };
        fetch(scriptURL, { method: 'POST', body: JSON.stringify(obj) }).then(() => { showSection('home'); fetchData(); });
    };

    function showLoading(s) { document.getElementById('loadingOverlay').style.display = s ? 'flex' : 'none'; }
    function printReport() { renderTable(filteredData); window.print(); renderTable(); }
</script>
</body>
</html>
